name: News Testing Pipeline

on:
#  schedule:
#    # Runs 4 times a day (UTC) - offset by 30 mins for 3rd channel stagger
#    - cron: '30 12 * * *'
#    - cron: '30 16 * * *'
#    - cron: '30 21 * * *'
#    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Select niche to run (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - politics
          - sports
          - tech
          - general
          - relations
          - makeup
          - gaming
          - crypto
          - celebrities
          - truecrime
          - fitness
          - food
          - finance

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      category: ${{ steps.pick-category.outputs.category }}
    steps:
      - id: pick-category
        run: |
          if [ "${{ github.event.inputs.category }}" != "" ]; then
            echo "category=${{ github.event.inputs.category }}" >> $GITHUB_OUTPUT
          else
            # Rotate through 13 categories: 4 per day, different topic each slot
            CATEGORIES=("politics" "sports" "tech" "general" "relations" "makeup" "gaming" "crypto" "celebrities" "truecrime" "fitness" "food" "finance")
            DAY=$(date +%j)  # Day of year (1-365)
            HOUR=$(date -u +%H)  # Current UTC hour
            
            # Map each cron slot to a slot number (0-3)
            if [ "$HOUR" -eq 12 ]; then SLOT=0
            elif [ "$HOUR" -eq 16 ]; then SLOT=1
            elif [ "$HOUR" -eq 21 ]; then SLOT=2
            else SLOT=3
            fi
            
            INDEX=$(( (DAY * 4 + SLOT) % 13 ))
            PICKED="${CATEGORIES[$INDEX]}"
            echo "category=$PICKED" >> $GITHUB_OUTPUT
            echo "📰 Day $DAY, Slot $SLOT -> Category: $PICKED"
          fi

  build-and-post:
    needs: setup
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Folders
        run: mkdir -p temp output db/deep_dark_news

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/domain="coder" rights="none" pattern="LABEL"/domain="coder" rights="read|write" pattern="LABEL"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run News Generation
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVEN_API_KEYS: ${{ secrets.ELEVEN_API_KEYS }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: python main_news.py --channel deep_dark_news --category ${{ needs.setup.outputs.category }}

      - name: Run YouTube Upload
        env:
          YOUTUBE_CLIENT_ID_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_ID_DEEPDARK }}
          YOUTUBE_CLIENT_SECRET_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_SECRET_DEEPDARK }}
          YOUTUBE_REFRESH_TOKEN_DEEPDARK: ${{ secrets.YOUTUBE_REFRESH_TOKEN_DEEPDARK }}
        run: python youtube_uploader.py --channel deep_dark_news

      - name: Fetch Stats and Optimize
        env:
          YOUTUBE_CLIENT_ID_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_ID_DEEPDARK }}
          YOUTUBE_CLIENT_SECRET_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_SECRET_DEEPDARK }}
          YOUTUBE_REFRESH_TOKEN_DEEPDARK: ${{ secrets.YOUTUBE_REFRESH_TOKEN_DEEPDARK }}
        run: python stats_fetcher.py --channel deep_dark_news || true

      - name: Save Memory
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add db/ || true
          git commit -m "🤖 News Memory Update (${{ needs.setup.outputs.category }}) [skip ci]" || echo "No changes"
          git pull --rebase origin main || true
          git push origin main || echo "Push failed"

name: Viral Video Pipeline

on:
  schedule:
    # 8 AM ET (12:00 UTC)
    - cron: '0 12 * * *'
    # 1 PM ET (17:00 UTC)
    - cron: '0 17 * * *'
    # 6 PM ET (22:00 UTC)
    - cron: '0 22 * * *'
    # 11 PM ET (03:00 UTC next day)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-post:
    strategy:
      matrix:
        channel: [oracle_feed, deep_dark_intel, motivational_shorts]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Necessary Directories
        run: mkdir -p temp output db

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # Fix ImageMagick security policy to allow TextClip
          sudo sed -i 's/domain="coder" rights="none" pattern="LABEL"/domain="coder" rights="read|write" pattern="LABEL"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: python -m playwright install chromium --with-deps

      - name: Stagger Channel Generation
        if: matrix.channel == 'deep_dark_intel' || matrix.channel == 'motivational_shorts'
        run: |
          if [ "${{ matrix.channel }}" == "deep_dark_intel" ]; then
            echo "Waiting 20 minutes before starting deep_dark_intel..."
            sleep 1200
          elif [ "${{ matrix.channel }}" == "motivational_shorts" ]; then
            echo "Waiting 40 minutes before starting motivational_shorts..."
            sleep 2400
          fi

      - name: Run Video Generation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVEN_API_KEYS: ${{ secrets.ELEVEN_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: python main.py --channel ${{ matrix.channel }}

      - name: Run YouTube Upload
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_CLIENT_ID_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_ID_DEEPDARK }}
          YOUTUBE_CLIENT_SECRET_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_SECRET_DEEPDARK }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_REFRESH_TOKEN_DEEPDARK: ${{ secrets.YOUTUBE_REFRESH_TOKEN_DEEPDARK }}
          YOUTUBE_CLIENT_ID_CH3: ${{ secrets.YOUTUBE_CLIENT_ID_CH3 }}
          YOUTUBE_CLIENT_SECRET_CH3: ${{ secrets.YOUTUBE_CLIENT_SECRET_CH3 }}
          YOUTUBE_REFRESH_TOKEN_CH3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH3 }}
        run: python youtube_uploader.py --channel ${{ matrix.channel }}

      - name: Fetch Stats and Optimize Model
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_CLIENT_ID_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_ID_DEEPDARK }}
          YOUTUBE_CLIENT_SECRET_DEEPDARK: ${{ secrets.YOUTUBE_CLIENT_SECRET_DEEPDARK }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_REFRESH_TOKEN_DEEPDARK: ${{ secrets.YOUTUBE_REFRESH_TOKEN_DEEPDARK }}
          YOUTUBE_CLIENT_ID_CH3: ${{ secrets.YOUTUBE_CLIENT_ID_CH3 }}
          YOUTUBE_CLIENT_SECRET_CH3: ${{ secrets.YOUTUBE_CLIENT_SECRET_CH3 }}
          YOUTUBE_REFRESH_TOKEN_CH3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH3 }}
        run: python stats_fetcher.py --channel ${{ matrix.channel }} || true

      - name: Save AI Memory to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add db/ || true
          git commit -m "🤖 AI Memory Update (${{ matrix.channel }}) [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push origin main || echo "Push failed, retrying may be needed"

#      - name: Run TikTok Stealth Upload
#        # Only run TikTok for the original channel for now (as requested: "just for youtube now")
#        if: matrix.channel == 'oracle_feed'
#        env:
#          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
#        run: |
#          echo "$TIKTOK_COOKIES" > tiktok_cookies.json
#          # Extract caption/hashtags from metadata.json safely
#          CAPTION=$(python3 -c "import json; print(json.load(open('temp/metadata.json'))['caption'])")
#          python tiktok_stealth_uploader.py --video output/final.mp4 --caption "$CAPTION"

      - name: Package Video & Metadata for Download
        if: always()
        run: |
          mkdir -p ready_to_post
          cp output/final.mp4 ready_to_post/video.mp4 || true
          if [ -f temp/metadata.json ]; then
            python3 -c "
          import json
          with open('temp/metadata.json') as f:
              meta = json.load(f)
          with open('ready_to_post/POST_GUIDE.txt', 'w') as f:
              f.write('=== CHANNEL: ${{ matrix.channel }} ===\n')
              f.write('📌 CAPTION:\n')
              f.write(meta.get('caption', 'N/A') + '\n\n')
              f.write('🏷️ HASHTAGS:\n')
              f.write(meta.get('hashtags', 'N/A') + '\n\n')
            "
          fi
          cd ready_to_post
          zip -r ../${{ matrix.channel }}_video_${{ github.run_number }}.zip ./*

      - name: 📦 Upload Artifact 
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.channel }}_video_${{ github.run_number }}.zip
          path: ${{ matrix.channel }}_video_${{ github.run_number }}.zip
          retention-days: 7

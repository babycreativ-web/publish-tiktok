name: Viral Video Pipeline

# on:
#   schedule:
#     # 10 AM ET (14:00 UTC)
#     - cron: '0 14 * * *'
#     # 3 PM ET (19:00 UTC)
#     - cron: '0 19 * * *'
#     # 9 PM ET (01:00 UTC next day)
#     - cron: '0 1 * * *'
#   workflow_dispatch: # Allows manual trigger

on:
  workflow_dispatch: # Allows manual trigger only

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Necessary Directories
        run: mkdir -p temp output

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # Fix ImageMagick security policy to allow TextClip
          sudo sed -i 's/domain="coder" rights="none" pattern="LABEL"/domain="coder" rights="read|write" pattern="LABEL"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i '/pattern="@\*"/d' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create TikTok Token File
        run: |
          echo '${{ secrets.TIKTOK_TOKENS_JSON }}' > tiktok_tokens.json

      - name: Run Video Generation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVEN_API_KEYS: ${{ secrets.ELEVEN_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        run: python main.py

      - name: Run YouTube Upload
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python youtube_uploader.py

      - name: Package Video & Metadata for Download
        if: always()
        run: |
          mkdir -p ready_to_post
          # Copy the generated video
          cp output/final.mp4 ready_to_post/video.mp4 || true
          # Create a handy post guide with caption and hashtags
          if [ -f temp/metadata.json ]; then
            python3 -c "
          import json
          with open('temp/metadata.json') as f:
              meta = json.load(f)
          with open('ready_to_post/POST_GUIDE.txt', 'w') as f:
              f.write('=== YOUR TIKTOK POST GUIDE ===\n\n')
              f.write('📌 CAPTION:\n')
              f.write(meta.get('caption', 'N/A') + '\n\n')
              f.write('🏷️ HASHTAGS:\n')
              f.write(meta.get('hashtags', 'N/A') + '\n\n')
              f.write('📋 HOW TO POST:\n')
              f.write('1. Download and extract this ZIP\n')
              f.write('2. Open TikTok and tap + (new video)\n')
              f.write('3. Upload video.mp4\n')
              f.write('4. Paste the caption + hashtags\n')
              f.write('5. Post!\n')
            "
          fi
          
          # Manually zip the files to ensure the downloaded file has a .zip extension
          cd ready_to_post
          zip -r ../tiktok_video_${{ github.run_number }}.zip ./*

      - name: 📦 Upload Artifact (Download Your Video Here!)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: tiktok_video_${{ github.run_number }}.zip
          path: tiktok_video_${{ github.run_number }}.zip
          retention-days: 7
